<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INHOUSE COMMERCIAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: none;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        .logo {
            position: absolute;
            width: 400px; /* Larger for TV display */
            height: auto;
            z-index: 10;
        }
        .logo svg {
            width: 100%;
            height: auto;
            display: block;
        }
        .logo svg text {
            transition: fill 0.3s ease;
        }
        .corner-glow {
            animation: cornerPulse 0.3s ease-out;
        }
        @keyframes cornerPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .exploding {
            animation: shake 0.15s infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-10px, 10px) rotate(-10deg); }
            50% { transform: translate(10px, -10px) rotate(10deg); }
            75% { transform: translate(-10px, -10px) rotate(-10deg); }
        }
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 5;
        }
        .particle-piece {
            position: absolute;
            border-radius: 3px;
            animation: particleExplode 1.5s ease-out forwards;
        }
        @keyframes particleExplode {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(var(--r)) scale(0);
                opacity: 0;
            }
        }
        .explosion-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            animation: flash 0.5s ease-out forwards;
        }
        @keyframes flash {
            0% { opacity: 0.9; }
            100% { opacity: 0; }
        }
        .explosion-ring {
            position: absolute;
            border: 4px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 8;
            animation: ringExpand 1.2s ease-out forwards;
        }
        @keyframes ringExpand {
            0% {
                width: 10px;
                height: 10px;
                opacity: 1;
                transform: translate(-50%, -50%) scale(0);
            }
            100% {
                width: 500px;
                height: 500px;
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        .corner-flash {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 7;
            animation: cornerFlash 0.5s ease-out forwards;
        }
        @keyframes cornerFlash {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(8);
                opacity: 0;
            }
        }
        .combo-counter {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 32px;
            text-align: center;
            z-index: 200;
            opacity: 0;
            transition: all 0.3s;
        }
        .combo-counter.active {
            opacity: 1;
            animation: comboAppear 0.5s ease-out;
        }
        @keyframes comboAppear {
            0% {
                transform: translateX(-50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translateX(-50%) scale(1.3);
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }
        }
        #corner-counter {
            display: none;
        }
        #corner-hit-text {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffff00;
            font-family: 'Arial Black', sans-serif;
            font-size: 24px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            z-index: 150;
            transition: opacity 0.2s;
        }
        .respawn-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 64px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
            animation: respawnCountdown 2s ease-out forwards;
        }
        @keyframes respawnCountdown {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.8);
            }
            40% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
            60% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.95);
            }
            80% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
        }
        
        /* Burn-in prevention - subtle movement */
        @keyframes subtleShift {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(1px, 0); }
            50% { transform: translate(1px, 1px); }
            75% { transform: translate(0, 1px); }
        }
        body {
            animation: subtleShift 3600s infinite; /* Very slow movement over 1 hour */
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="logo" id="logo">
            <svg id="logo-svg" viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg">
                <text id="logo-text-main" x="200" y="62" text-anchor="middle"
                      font-family="Arial, Helvetica, sans-serif" font-weight="400"
                      font-size="72" letter-spacing="2" fill="#ffffff">INHOUSE</text>
                <text id="logo-text-sub" x="200" y="108" text-anchor="middle"
                      font-family="Arial, Helvetica, sans-serif" font-weight="300"
                      font-size="30" letter-spacing="14" fill="#ffffff">COMMERCIAL</text>
            </svg>
        </div>
    </div>
    <div id="corner-hit-text"></div>
    <div class="combo-counter" id="combo-counter"></div>
    <script>
        class BouncingLogo {
            constructor(comboCount = 0) {
                this.logo = document.getElementById('logo');
                this.logoTextMain = document.getElementById('logo-text-main');
                this.logoTextSub = document.getElementById('logo-text-sub');
                this.container = document.getElementById('container');
                this.cornerHitText = document.getElementById('corner-hit-text');
                this.comboCounter = document.getElementById('combo-counter');

                this.logoWidth = this.logo.offsetWidth || 400;
                this.logoHeight = this.logo.offsetHeight || 130;

                this.x = Math.random() * (window.innerWidth - this.logoWidth);
                this.y = Math.random() * (window.innerHeight - this.logoHeight);
                this.vx = (Math.random() > 0.5 ? 1 : -1) * (2.5 + comboCount * 0.2);
                this.vy = (Math.random() > 0.5 ? 1 : -1) * (2.5 + comboCount * 0.2);

                this.cornerHits = 0;
                this.maxCornerHits = 6;
                this.lastHitCorner = null;
                this.isExploding = false;
                this.comboCount = comboCount;

                this.colors = ['#ffffff', '#12403c'];
                this.currentColorIndex = 0;
                this.isWhite = true;

                this.cornerColors = [
                    '#ffff00', '#ffaa00', '#ff6600',
                    '#ff3300', '#ff0000', '#ff0000'
                ];

                this.init();
            }
            init() {
                this.logo.style.display = 'block';
                this.logo.classList.remove('exploding', 'corner-glow');
                this.updatePosition();

                if (this.comboCount > 0) {
                    this.showCombo();
                }

                this.cornerHitText.textContent = '';
                this.cornerHitText.style.opacity = '0';
                this.setLogoColor('#ffffff');

                this.animate();
                window.addEventListener('resize', () => this.handleResize());
            }
            updatePosition() {
                this.logoWidth = this.logo.offsetWidth;
                this.logoHeight = this.logo.offsetHeight;
                this.logo.style.left = this.x + 'px';
                this.logo.style.top = this.y + 'px';
            }
            animate() {
                if (this.isExploding) return;
                this.x += this.vx;
                this.y += this.vy;

                const maxX = window.innerWidth - this.logoWidth;
                const maxY = window.innerHeight - this.logoHeight;

                let hitCorner = false;
                let hitWall = false;
                let corner = null;

                if (this.x <= 0) {
                    this.vx = Math.abs(this.vx);
                    hitWall = true;
                    if (this.y <= 0) corner = 'top-left';
                    if (this.y >= maxY) corner = 'bottom-left';
                } else if (this.x >= maxX) {
                    this.vx = -Math.abs(this.vx);
                    hitWall = true;
                    if (this.y <= 0) corner = 'top-right';
                    if (this.y >= maxY) corner = 'bottom-right';
                }

                if (this.y <= 0) {
                    this.vy = Math.abs(this.vy);
                    hitWall = true;
                    if (this.x <= 0) corner = 'top-left';
                    if (this.x >= maxX) corner = 'top-right';
                } else if (this.y >= maxY) {
                    this.vy = -Math.abs(this.vy);
                    hitWall = true;
                    if (this.x <= 0) corner = 'bottom-left';
                    if (this.x >= maxX) corner = 'bottom-right';
                }

                const cornerThreshold = 8;
                const isTopEdge = this.y <= cornerThreshold;
                const isBottomEdge = this.y >= maxY - cornerThreshold;
                const isLeftEdge = this.x <= cornerThreshold;
                const isRightEdge = this.x >= maxX - cornerThreshold;

                if ((isTopEdge && isLeftEdge) ||
                    (isTopEdge && isRightEdge) ||
                    (isBottomEdge && isLeftEdge) ||
                    (isBottomEdge && isRightEdge)) {
                    hitCorner = true;
                    if (isTopEdge && isLeftEdge) corner = 'top-left';
                    if (isTopEdge && isRightEdge) corner = 'top-right';
                    if (isBottomEdge && isLeftEdge) corner = 'bottom-left';
                    if (isBottomEdge && isRightEdge) corner = 'bottom-right';
                }

                this.x = Math.max(0, Math.min(this.x, maxX));
                this.y = Math.max(0, Math.min(this.y, maxY));

                this.logo.style.left = this.x + 'px';
                this.logo.style.top = this.y + 'px';

                if (hitCorner && corner && corner !== this.lastHitCorner) {
                    this.handleCornerHit(corner);
                } else if (hitWall && !hitCorner) {
                    this.handleWallBounce();
                }

                requestAnimationFrame(() => this.animate());
            }
            handleCornerHit(corner) {
                this.cornerHits++;
                this.lastHitCorner = corner;

                if (this.cornerHits >= this.maxCornerHits) {
                    this.explode(corner);
                } else {
                    this.showCornerHitEffect(corner);
                    this.changeColor();

                    if (this.cornerHits >= this.maxCornerHits - 2) {
                        this.logo.classList.add('exploding');
                        setTimeout(() => {
                            if (!this.isExploding) {
                                this.logo.classList.remove('exploding');
                            }
                        }, 500);
                    }
                }
            }
            handleWallBounce() {
                this.lastHitCorner = null;
                this.changeColor();
            }
            setLogoColor(color) {
                if (this.logoTextMain) {
                    this.logoTextMain.setAttribute('fill', color);
                }
                if (this.logoTextSub) {
                    this.logoTextSub.setAttribute('fill', color);
                }
                this.isWhite = (color === '#ffffff');
            }
            showCornerHitEffect(corner) {
                const cornerNames = {
                    'top-left': '↖ TOP LEFT!',
                    'top-right': '↗ TOP RIGHT!',
                    'bottom-left': '↙ BOTTOM LEFT!',
                    'bottom-right': '↘ BOTTOM RIGHT!'
                };

                this.cornerHitText.textContent = cornerNames[corner] || 'CORNER!';
                this.cornerHitText.style.color = this.cornerColors[Math.min(this.cornerHits - 1, this.cornerColors.length - 1)];
                this.cornerHitText.style.opacity = '1';

                this.logo.classList.add('corner-glow');
                setTimeout(() => {
                    this.logo.classList.remove('corner-glow');
                }, 300);

                this.createCornerFlash(corner);

                setTimeout(() => {
                    this.cornerHitText.style.opacity = '0';
                }, 800);
            }
            createCornerFlash(corner) {
                const flash = document.createElement('div');
                flash.className = 'corner-flash';

                switch(corner) {
                    case 'top-left':
                        flash.style.left = '0px';
                        flash.style.top = '0px';
                        break;
                    case 'top-right':
                        flash.style.right = '0px';
                        flash.style.top = '0px';
                        break;
                    case 'bottom-left':
                        flash.style.left = '0px';
                        flash.style.bottom = '0px';
                        break;
                    case 'bottom-right':
                        flash.style.right = '0px';
                        flash.style.bottom = '0px';
                        break;
                }

                this.container.appendChild(flash);
                setTimeout(() => flash.remove(), 500);
            }
            showCombo() {
                this.comboCounter.textContent = `🔥 ${this.comboCount}x CORNER COMBO!`;
                this.comboCounter.className = 'combo-counter active';
                setTimeout(() => {
                    this.comboCounter.className = 'combo-counter';
                }, 2000);
            }
            explode(corner) {
                this.isExploding = true;
                this.logo.style.display = 'none';

                this.createExplosionFlash();
                this.createExplosionRings(corner);
                this.createParticles(corner);
                this.createRespawnText();
                this.screenShake();

                document.body.style.background = '#fff';
                setTimeout(() => {
                    document.body.style.background = '#000';
                }, 100);

                this.cornerHitText.style.opacity = '0';

                setTimeout(() => {
                    this.cleanup();
                    new BouncingLogo(this.comboCount + 1);
                }, 2500);
            }
            createExplosionFlash() {
                const flash = document.createElement('div');
                flash.className = 'explosion-flash';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 500);
            }
            createExplosionRings(corner) {
                let centerX, centerY;

                switch(corner) {
                    case 'top-left':
                        centerX = this.logoWidth / 2;
                        centerY = this.logoHeight / 2;
                        break;
                    case 'top-right':
                        centerX = window.innerWidth - this.logoWidth / 2;
                        centerY = this.logoHeight / 2;
                        break;
                    case 'bottom-left':
                        centerX = this.logoWidth / 2;
                        centerY = window.innerHeight - this.logoHeight / 2;
                        break;
                    case 'bottom-right':
                        centerX = window.innerWidth - this.logoWidth / 2;
                        centerY = window.innerHeight - this.logoHeight / 2;
                        break;
                    default:
                        centerX = window.innerWidth / 2;
                        centerY = window.innerHeight / 2;
                }

                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const ring = document.createElement('div');
                        ring.className = 'explosion-ring';
                        ring.style.left = centerX + 'px';
                        ring.style.top = centerY + 'px';
                        ring.style.animationDelay = (i * 0.08) + 's';
                        this.container.appendChild(ring);
                        setTimeout(() => ring.remove(), 2000);
                    }, i * 80);
                }
            }
            createParticles(corner) {
                const logoRect = this.logo.getBoundingClientRect();
                const centerX = logoRect.left + logoRect.width / 2;
                const centerY = logoRect.top + logoRect.height / 2;

                const particleCount = 80 + (this.comboCount * 20);
                const colors = ['#ffffff', '#12403c', '#ff0000', '#ff6600', '#ffff00', '#ff00ff', '#00ffff'];

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = centerX + 'px';
                    particle.style.top = centerY + 'px';

                    const piece = document.createElement('div');
                    piece.className = 'particle-piece';
                    piece.style.width = (Math.random() * 30 + 10) + 'px';
                    piece.style.height = (Math.random() * 30 + 10) + 'px';
                    piece.style.background = colors[Math.floor(Math.random() * colors.length)];

                    const screenCenterX = window.innerWidth / 2;
                    const screenCenterY = window.innerHeight / 2;
                    const angle = Math.atan2(screenCenterY - centerY, screenCenterX - centerX) + (Math.random() - 0.5) * Math.PI;
                    const distance = Math.random() * 500 + 200;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance;
                    const rotation = Math.random() * 1080 - 540;

                    piece.style.setProperty('--tx', tx + 'px');
                    piece.style.setProperty('--ty', ty + 'px');
                    piece.style.setProperty('--r', rotation + 'deg');

                    particle.appendChild(piece);
                    this.container.appendChild(particle);
                    setTimeout(() => particle.remove(), 2000);
                }
            }
            createRespawnText() {
                const respawnText = document.createElement('div');
                respawnText.className = 'respawn-text';

                const messages = [
                    '💥 CORNER BOOM!',
                    '🔥 PERFECT CORNER!',
                    '⚡ CORNER MASTER!',
                    '🌟 CORNER LEGEND!',
                    '💫 UNSTOPPABLE!',
                    '🎯 CORNER GOD!',
                ];

                const messageIndex = Math.min(this.comboCount, messages.length - 1);
                respawnText.innerHTML = messages[messageIndex];
                document.body.appendChild(respawnText);
                setTimeout(() => respawnText.remove(), 2000);
            }
            screenShake() {
                const intensity = 20 + (this.comboCount * 4);
                const duration = 600;
                const startTime = Date.now();

                const shake = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = elapsed / duration;

                    if (progress < 1) {
                        const currentIntensity = intensity * (1 - progress);
                        const dx = (Math.random() - 0.5) * currentIntensity * 2;
                        const dy = (Math.random() - 0.5) * currentIntensity * 2;
                        document.body.style.transform = `translate(${dx}px, ${dy}px)`;
                        requestAnimationFrame(shake);
                    } else {
                        document.body.style.transform = 'translate(0, 0)';
                    }
                };
                shake();
            }
            changeColor() {
                this.currentColorIndex = (this.currentColorIndex + 1) % this.colors.length;
                this.setLogoColor(this.colors[this.currentColorIndex]);
            }
            cleanup() {
                document.querySelectorAll('.explosion-flash, .explosion-ring, .particle, .respawn-text, .corner-flash').forEach(el => el.remove());
                this.logo.style.display = 'block';
                this.logo.classList.remove('exploding', 'corner-glow');
            }
            handleResize() {
                if (this.isExploding) return;
                this.logoWidth = this.logo.offsetWidth;
                this.logoHeight = this.logo.offsetHeight;
                const maxX = window.innerWidth - this.logoWidth;
                const maxY = window.innerHeight - this.logoHeight;
                this.x = Math.min(this.x, maxX);
                this.y = Math.min(this.y, maxY);
            }
        }
        window.addEventListener('load', () => {
            new BouncingLogo();
        });
    </script>
</body>
</html>
