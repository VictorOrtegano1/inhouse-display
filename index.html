<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INHOUSE COMMERCIAL - 3D Letters</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
        background: #000;
        overflow: hidden;
        cursor: none;
        perspective: 1400px;
    }
    .container { position: relative; width: 100%; height: 100%; }

    .logo {
        position: absolute;
        width: 520px;
        height: 240px;
        z-index: 10;
        transform-style: preserve-3d;
        display: none;
    }

    .text3d {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        transform-style: preserve-3d;
        animation: spin 8s infinite linear;
    }
    @keyframes spin {
        from { transform: rotateX(-12deg) rotateY(0deg); }
        to   { transform: rotateX(-12deg) rotateY(360deg); }
    }

    .layer {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transform-style: preserve-3d;
        font-family: 'Arial Black', 'Arial Bold', Arial, Helvetica, sans-serif;
        white-space: nowrap; line-height: 1;
    }
    .line1 { font-size: 100px; font-weight: 900; letter-spacing: 2px; }
    .line2 { font-size: 36px; font-weight: 900; letter-spacing: 16px; margin-top: 10px; padding-left: 16px; }

    #corner-hit-text {
        position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
        color: #ffff00; font-family: 'Arial Black', sans-serif; font-size: 30px;
        text-align: center; opacity: 0; pointer-events: none; z-index: 700;
        transition: opacity .25s; text-shadow: 0 0 16px #ffff00;
    }
</style>
</head>
<body>
<div class="container" id="container">
    <div class="logo" id="logo">
        <div class="text3d" id="text3d"></div>
    </div>
</div>
<div id="corner-hit-text"></div>

<script>
    // ---- Polyfills / helpers for older TV browsers (LG webOS etc.) ----
    if (!Math.hypot) {
        Math.hypot = function () {
            var s = 0, i;
            for (i = 0; i < arguments.length; i++) s += arguments[i] * arguments[i];
            return Math.sqrt(s);
        };
    }
    var RAF = window.requestAnimationFrame ||
              function (cb) { return setTimeout(function () { cb(Date.now()); }, 16); };
    function now() { return Date.now(); }
    function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
    function easeOutBack(t) { var c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t-1, 3) + c1 * Math.pow(t-1, 2); }

    // ================= 3D TEXT =================
    // Fewer, thicker slices = lighter for the TV and a chunkier, bolder look.
    var DEPTH = 16, SLICE = 2.4, STROKE = '3px';
    var text3d = document.getElementById('text3d');

    function buildText() {
        text3d.innerHTML = '';
        for (var i = DEPTH; i >= 0; i--) {
            var layer = document.createElement('div');
            layer.className = 'layer';
            layer.style.transform = 'translateZ(' + (-i * SLICE) + 'px)';
            layer.setAttribute('data-depth', (i / DEPTH).toFixed(3));
            layer.setAttribute('data-face', i === 0 ? '1' : '0');
            layer.innerHTML = '<div class="line1">INHOUSE</div><div class="line2">COMMERCIAL</div>';
            text3d.appendChild(layer);
        }
        paintText('#ffffff');
    }

    function paintText(hex) {
        var isWhite = hex.toLowerCase() === '#ffffff';
        var layers = text3d.querySelectorAll('.layer');
        for (var i = 0; i < layers.length; i++) {
            var layer = layers[i];
            var t = parseFloat(layer.getAttribute('data-depth'));
            var col = layer.getAttribute('data-face') === '1' ? hex : shade(hex, 0.62 - t * 0.5);
            layer.style.color = col;
            // stroke in the SAME colour thickens the glyphs so they never look skinny
            layer.style.webkitTextStroke = STROKE + ' ' + col;
            if (layer.getAttribute('data-face') === '1') {
                layer.style.textShadow = isWhite ? '0 0 6px rgba(0,0,0,.4)' : '0 0 18px rgba(255,255,255,.65)';
            } else {
                layer.style.textShadow = 'none';
            }
        }
    }
    function shade(hex, factor) {
        if (hex.toLowerCase() === '#ffffff') hex = '#8fb7b0';
        var r = Math.round(parseInt(hex.slice(1,3),16) * factor);
        var g = Math.round(parseInt(hex.slice(3,5),16) * factor);
        var b = Math.round(parseInt(hex.slice(5,7),16) * factor);
        return '#' + p2(r) + p2(g) + p2(b);
    }
    function p2(n) { var s = n.toString(16); return s.length < 2 ? '0' + s : s; }

    // ================= GAMECUBE-STYLE "IH" BOOT (light: 3 faces, no shadows) =================
    function buildCube(size, hero) {
        var c = document.createElement('div');
        c.style.cssText = 'position:absolute;width:'+size+'px;height:'+size+'px;transform-style:preserve-3d;';
        var s2 = size / 2;
        // only the 3 faces visible in the isometric view are built
        var faces = hero ? [
            ['translateZ('+s2+'px)','#8fd0c7'],
            ['rotateY(90deg) translateZ('+s2+'px)','#7cc3b9'],
            ['rotateX(90deg) translateZ('+s2+'px)','#cdefe9']
        ] : [
            ['translateZ('+s2+'px)','#12403c'],
            ['rotateY(90deg) translateZ('+s2+'px)','#0e322e'],
            ['rotateX(90deg) translateZ('+s2+'px)','#1f7a6f']
        ];
        for (var i = 0; i < faces.length; i++) {
            var f = document.createElement('div');
            f.style.cssText = 'position:absolute;width:'+size+'px;height:'+size+'px;transform:'+faces[i][0]+
                ';background:'+faces[i][1]+';border:1px solid rgba(0,0,0,.45);';
            c.appendChild(f);
        }
        return c;
    }

    // Runs the boot; ALWAYS calls onDone exactly once, even on error.
    function runBoot(onDone) {
        var finished = false;
        function finish() { if (finished) return; finished = true; try { if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay); } catch (e) {} onDone(); }
        var overlay = null;
        try {
            overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;background:#000;overflow:hidden;perspective:1200px;';
            var scene = document.createElement('div');
            scene.style.cssText = 'position:absolute;left:50%;top:50%;transform-style:preserve-3d;' +
                'transform:translate(-50%,-50%) rotateX(-26deg) rotateY(-37deg);';
            overlay.appendChild(scene);
            document.body.appendChild(overlay);

            var S = 42, COLS = 7, ROWS = 5;
            var ox = -(COLS*S)/2 + S/2, oy = -(ROWS*S)/2 + S/2;
            function pos(col, row) { return [ox + col*S, oy + row*S]; }

            var cells = [
                [0,0],[1,0],[2,0],[1,1],[1,2],[1,3],[0,4],[1,4],[2,4],       // I
                [4,0],[4,1],[6,1],[4,2],[5,2],[6,2],[4,3],[6,3],[4,4],[6,4]  // H
            ];
            var baseCubes = [];
            for (var i = 0; i < cells.length; i++) {
                var pp = pos(cells[i][0], cells[i][1]);
                var cube = buildCube(S, false);
                cube.style.opacity = '0';
                scene.appendChild(cube);
                baseCubes.push({ el: cube, x: pp[0], y: pp[1], delay: i * 42 });
            }
            var BASE_DUR = 340, STAG = 42;
            var baseTotal = cells.length * STAG + BASE_DUR;

            var hpos = pos(6, 0);
            var tx = hpos[0], ty = hpos[1], sx = ox - 2.5 * S;
            var hero = buildCube(S, true);
            hero.style.opacity = '0';
            scene.appendChild(hero);
            var HERO_START = baseTotal + 60, HERO_DUR = 950;

            var mark = null, markShown = false;
            var t0 = now(), settled = false, settleAt = 0;

            function frame() {
                if (finished) return;
                var t = now() - t0;

                for (var i = 0; i < baseCubes.length; i++) {
                    var b = baseCubes[i];
                    var lt = t - b.delay;
                    if (lt <= 0) continue;
                    var p = clamp(lt / BASE_DUR, 0, 1);
                    var e = easeOutBack(p);
                    var y = b.y - 260 + 260 * e;
                    var z = 200 * (1 - e);
                    var sc = 0.2 + 0.8 * e;
                    b.el.style.opacity = clamp(p * 1.6, 0, 1).toFixed(2);
                    b.el.style.transform = 'translate3d(' + b.x + 'px,' + y + 'px,' + z + 'px) scale(' + sc + ')';
                }

                if (t >= HERO_START) {
                    var php = clamp((t - HERO_START) / HERO_DUR, 0, 1);
                    var x = sx + (tx - sx) * php;
                    var yy = (ty - 30) + (30) * php - 150 * Math.sin(php * Math.PI);
                    var rot = 720 * php;
                    hero.style.opacity = '1';
                    hero.style.transform = 'translate3d(' + x + 'px,' + yy + 'px,0) rotateZ(' + rot + 'deg)';
                }

                if (t >= HERO_START + HERO_DUR && !settled) { settled = true; settleAt = t; }

                if (settled && !markShown && t >= settleAt + 120) {
                    markShown = true;
                    mark = document.createElement('div');
                    mark.style.cssText = 'position:absolute;left:50%;top:60%;text-align:center;color:#fff;' +
                        'font-family:Arial,Helvetica,sans-serif;white-space:nowrap;opacity:0;' +
                        'transform:translateX(-50%) translateX(-160px);transition:opacity .6s, transform .6s;';
                    mark.innerHTML = '<div style="font-weight:900;font-size:40px;letter-spacing:3px;">INHOUSE</div>' +
                        '<div style="font-weight:400;font-size:17px;letter-spacing:11px;padding-left:11px;margin-top:4px;">COMMERCIAL</div>';
                    overlay.appendChild(mark);
                    void mark.offsetWidth;
                    mark.style.opacity = '1';
                    mark.style.transform = 'translateX(-50%) translateX(0)';
                }

                if (settled && t >= settleAt + 1600) {
                    overlay.style.transition = 'opacity .45s';
                    overlay.style.opacity = '0';
                    setTimeout(finish, 480);
                    return;
                }
                RAF(frame);
            }
            RAF(frame);
        } catch (err) {
            finish();
        }
    }

    function safeBoot(onDone) {
        var done = false;
        function fin() { if (done) return; done = true; onDone(); }
        setTimeout(fin, 12000);
        try { runBoot(fin); } catch (e) { fin(); }
    }

    // ================= BOUNCING LOGO =================
    function BouncingLogo() {
        this.logo = document.getElementById('logo');
        this.cornerHitText = document.getElementById('corner-hit-text');
        // Bounce box hugs the ACTUAL rendered letters so they hit the real edges
        this.logoWidth = this.logo.offsetWidth || 520;
        this.logoHeight = this.logo.offsetHeight || 240;
        this.x = Math.random() * (window.innerWidth - this.logoWidth);
        this.y = Math.random() * (window.innerHeight - this.logoHeight);
        var spd = 3;
        this.vx = (Math.random() > .5 ? 1 : -1) * spd;
        this.vy = (Math.random() > .5 ? 1 : -1) * spd;
        this.colors = ['#ffffff', '#12403c'];
        this.currentColorIndex = 0;
        this.paused = false; this.celebrating = false; this.target = null;
        this.init();
    }
    BouncingLogo.prototype.init = function () {
        var self = this;
        this.logo.style.display = 'block';
        this.updatePosition();
        paintText(this.colors[this.currentColorIndex]);
        this.loop();
        window.addEventListener('resize', function () { self.handleResize(); });
        this.timer = setInterval(function () { self.aimAtCorner(); }, 40000);
    };
    BouncingLogo.prototype.updatePosition = function () { this.logo.style.left = this.x+'px'; this.logo.style.top = this.y+'px'; };
    BouncingLogo.prototype.speed = function () { return Math.hypot(this.vx, this.vy) || 3; };
    BouncingLogo.prototype.aimAtCorner = function () {
        if (this.paused || this.celebrating || this.target) return;
        var maxX = window.innerWidth - this.logoWidth, maxY = window.innerHeight - this.logoHeight;
        var corners = [
            { x:0, y:0, name:'↖ TOP LEFT!' }, { x:maxX, y:0, name:'↗ TOP RIGHT!' },
            { x:0, y:maxY, name:'↙ BOTTOM LEFT!' }, { x:maxX, y:maxY, name:'↘ BOTTOM RIGHT!' }
        ];
        var c = corners[Math.floor(Math.random()*corners.length)];
        var dx = c.x - this.x, dy = c.y - this.y, mag = Math.hypot(dx, dy) || 1, spd = this.speed();
        this.vx = dx/mag*spd; this.vy = dy/mag*spd; this.target = c;
    };
    BouncingLogo.prototype.loop = function () {
        var self = this;
        if (this.paused) return;
        this.x += this.vx; this.y += this.vy;
        var maxX = window.innerWidth - this.logoWidth, maxY = window.innerHeight - this.logoHeight;

        if (this.target && Math.hypot(this.x - this.target.x, this.y - this.target.y) <= this.speed() + 1) {
            this.x = this.target.x; this.y = this.target.y; this.updatePosition();
            this.cornerHit(this.target); return;
        }
        var hitWall = false;
        if (this.x <= 0) { this.vx = Math.abs(this.vx); hitWall = true; }
        else if (this.x >= maxX) { this.vx = -Math.abs(this.vx); hitWall = true; }
        if (this.y <= 0) { this.vy = Math.abs(this.vy); hitWall = true; }
        else if (this.y >= maxY) { this.vy = -Math.abs(this.vy); hitWall = true; }
        this.x = Math.max(0, Math.min(this.x, maxX));
        this.y = Math.max(0, Math.min(this.y, maxY));
        this.updatePosition();
        if (hitWall && !this.target) this.nextColor();
        RAF(function () { self.loop(); });
    };
    BouncingLogo.prototype.nextColor = function () {
        this.currentColorIndex = (this.currentColorIndex + 1) % this.colors.length;
        paintText(this.colors[this.currentColorIndex]);
    };
    BouncingLogo.prototype.cornerHit = function (c) {
        var self = this;
        this.celebrating = true; this.paused = true; this.target = null;
        this.cornerHitText.innerHTML = c.name;
        this.cornerHitText.style.opacity = '1';
        this.vx = c.x === 0 ? Math.abs(this.vx) : -Math.abs(this.vx);
        this.vy = c.y === 0 ? Math.abs(this.vy) : -Math.abs(this.vy);
        safeBoot(function () {
            self.cornerHitText.style.opacity = '0';
            self.celebrating = false; self.paused = false; self.loop();
        });
    };
    BouncingLogo.prototype.handleResize = function () {
        if (this.paused) return;
        this.x = Math.min(this.x, window.innerWidth - this.logoWidth);
        this.y = Math.min(this.y, window.innerHeight - this.logoHeight);
    };

    // Measure the real text and size the bounce box to fit it snugly.
    function fitLogoToText() {
        try {
            var tmp = document.createElement('div');
            tmp.style.cssText = "position:absolute;left:-99999px;top:0;white-space:nowrap;line-height:1;" +
                "font-family:'Arial Black','Arial Bold',Arial,Helvetica,sans-serif;";
            tmp.innerHTML =
                '<div style="font-size:100px;font-weight:900;letter-spacing:2px;">INHOUSE</div>' +
                '<div style="font-size:36px;font-weight:900;letter-spacing:16px;padding-left:16px;margin-top:10px;">COMMERCIAL</div>';
            document.body.appendChild(tmp);
            var w = Math.max(tmp.children[0].offsetWidth, tmp.children[1].offsetWidth);
            var h = tmp.children[0].offsetHeight + 10 + tmp.children[1].offsetHeight;
            document.body.removeChild(tmp);
            var logo = document.getElementById('logo');
            logo.style.width = (Math.ceil(w) + 8) + 'px';
            logo.style.height = (Math.ceil(h) + 8) + 'px';
        } catch (e) {}
    }

    // ================= START =================
    function start() {
        try { buildText(); fitLogoToText(); } catch (e) {}
        safeBoot(function () { try { new BouncingLogo(); } catch (e) {} });
    }
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        start();
    } else {
        window.addEventListener('load', start);
    }
</script>
</body>
</html>
